<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"> <!-- YE LINE SABSE ZAROORI HAI -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:10px;
}

h2{
text-align:center;
}

#chat{
height:500px;
overflow-y:auto;
padding:10px;
margin-bottom:80px;
}

.user{
background:#2563eb;
padding:10px;
border-radius:10px;
margin:10px;
text-align:right;
}

.aura{
background:#1e293b;
padding:10px;
border-radius:10px;
margin:10px;
text-align:left;
}

.header{

text-align:center;
margin-bottom:20px;

}

.header p{

color:lightgreen;

}

.bottom{
position:fixed;
bottom:10px;
width:95%;
}

#typing{

animation: blink 1s infinite;

}

@keyframes blink{

0%{
opacity:1;
}

50%{
opacity:0.5;
}

100%{
opacity:1;
}

}

input{
width:70%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
background:#2563eb;
color:white;
}

.face{

width:120px;
height:120px;
background:#1e293b;
border-radius:50%;
margin:auto;
margin-bottom:15px;

}

.eyes{

display:flex;
justify-content:space-around;
padding-top:40px;

}

.eye{

width:15px;
height:15px;
background:white;
border-radius:50%;

animation: blinkEyes 4s infinite;

}

.wave {
    display: none; 
    justify-content: center;
    align-items: flex-end;
    gap: 5px;
    height: 40px;
    margin: 25px auto 0 auto; /* Center alignment fix */
}



.wave span{

width:6px;
height:10px;
background:#60a5fa;
border-radius:10px;

animation: wave 1s infinite ease-in-out;

}

.wave span:nth-child(2){
animation-delay:0.1s;
}

.wave span:nth-child(3){
animation-delay:0.2s;
}

.wave span:nth-child(4){
animation-delay:0.3s;
}

.wave span:nth-child(5){
animation-delay:0.4s;
}

@keyframes wave{

0%{
height:10px;
}

50%{
height:35px;
}

100%{
height:10px;
}

}

@keyframes blinkEyes{

0%{
height:15px;
}

48%{
height:15px;
}

50%{
height:2px;
}

52%{
height:15px;
}

100%{
height:15px;
}

}

</style>

</head>

<body>

<div class="header">

<div class="face">

<div class="eyes">

<div class="eye"></div>

<div class="eye"></div>

</div>

<div class="wave">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

</div>

<h2>👩 Aura AI</h2>

<p>🟢 Online</p>

</div>

<div id="chat"></div>

<div class="bottom">
    <input id="userInput" type="text" placeholder="Type message..." onkeydown="if(event.key==='Enter') sendMessage()">
    
    <button onclick="sendMessage()">Send</button>
    
    <!-- ID check karein: "micBtn" honi chahiye -->
    <button onclick="startListening()" id="micBtn">🎤 Speak</button>
    
    <button onclick="location.reload()">Clear</button>
</div>

<script>
async function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value;
    if (message === "") return;

    let chat = document.getElementById("chat");
    let time = new Date();
    let currentTime = time.getHours() + ":" + (time.getMinutes() < 10 ? '0' : '') + time.getMinutes();

    chat.innerHTML += '<div class="user">' + message + '<br><small>' + currentTime + '</small></div>';
    chat.scrollTop = chat.scrollHeight;
    input.value = "";

    try {
        chat.innerHTML += '<div class="aura" id="typing">Aura is typing...</div>';
        chat.scrollTop = chat.scrollHeight;

        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer api key",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "openai/gpt-3.5-turbo",
                messages: [
                    { role: "system", content: "You are Aura, a friendly female AI friend. Speak in Hinglish." },
                    { role: "user", content: message }
                ]
            })
        });

        const data = await response.json();
        let reply = data.choices[0].message.content;

        let typingMsg = document.getElementById("typing");
        if (typingMsg) typingMsg.remove();

        chat.innerHTML += '<div class="aura">' + reply + '<br><small>' + currentTime + '</small></div>';
        chat.scrollTop = chat.scrollHeight;

        // Voice ko safely chalana
        speak(reply);

    } catch (error) {
        let typingMsg = document.getElementById("typing");
        if (typingMsg) typingMsg.remove();
        chat.innerHTML += '<div class="aura">Error: Connection issue 😢</div>';
    }
}

function speak(text) {
    if (!('speechSynthesis' in window)) return;

    window.speechSynthesis.cancel();
    let utterance = new SpeechSynthesisUtterance(text);

    // Sabse pehle available voices check karte hain
    let voices = window.speechSynthesis.getVoices();
    
    // Hindi Female voice dhoondhne ki koshish (Google Hindi ya Hindi India)
    let selectedVoice = voices.find(voice => 
        (voice.lang === 'hi-IN' || voice.lang === 'hi_IN') && voice.name.includes('Female')
    ) || voices.find(voice => voice.lang === 'hi-IN');

    if (selectedVoice) {
        utterance.voice = selectedVoice;
    }

    utterance.lang = 'hi-IN';
    utterance.pitch = 1.2; // Pitch badhane se awaaz ladki jaisi aur soft hoti hai
    utterance.rate = 0.9;  // Thoda dheere bolne se natural lagta hai
    utterance.volume = 1.0;

    utterance.onstart = () => {
        document.querySelector(".wave").style.display = "flex";
    };
    utterance.onend = () => {
        document.querySelector(".wave").style.display = "none";
    };

    window.speechSynthesis.speak(utterance);
}

function startListening() {
    const micBtn = document.getElementById("micBtn");
    
    // Check if browser supports speech
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Aapka browser mic support nahi karta. Chrome use karein.");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'hi-IN';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        micBtn.innerHTML = "Sunaayi de raha hai... 👂";
        micBtn.style.background = "#ef4444";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById("userInput").value = transcript;
        sendMessage(); // Khud b khud send kar dega
    };

    recognition.onerror = (e) => {
        console.error(e);
        micBtn.innerHTML = "🎤 Speak";
        micBtn.style.background = "#2563eb";
        alert("Mic Error: " + e.error + ". Make sure you are using Chrome.");
    };

    recognition.onend = () => {
        micBtn.innerHTML = "🎤 Speak";
        micBtn.style.background = "#2563eb";
    };

    recognition.start();
}


</script>


</body>
</html>
